<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แดชบอร์ดคำนวณการใช้เงินรายเดือน</title>

<style>
  :root{
    --surface-1:#F5F5F4;
    --surface-2:#FFFFFF;
    --text-secondary:#6B6B68;
    --text-primary:#1A1A18;
    --radius:12px;
    --border:#E4E3E0;
    --bg-success:#E7F5EF;
    --text-success:#1D9E75;
    --bg-danger:#FBE9E8;
    --text-danger:#C0392B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:2rem 1rem;
    background:var(--surface-1);
    color:var(--text-primary);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
  }
  .dashboard-wrap{
    max-width:760px;
    margin:0 auto;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:16px;
    padding:1.5rem;
  }
  input[type="number"]{
    font-family:inherit;
    color:var(--text-primary);
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 8px;
    outline:none;
  }
  input[type="number"]:focus{
    border-color:var(--text-success);
  }
  .sr-only{
    position:absolute;
    width:1px; height:1px;
    padding:0; margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }
  @media (max-width:600px){
    div[style*="grid-template-columns:220px 1fr"]{
      grid-template-columns:1fr !important;
    }
  }
</style>
</head>
<body>
<div class="dashboard-wrap">

<h2 class="sr-only">แดชบอร์ดคำนวณการใช้เงินรายเดือน แสดงเงินเดือน รายจ่ายรวม เงินเหลือใช้ และสัดส่วนรายจ่ายแต่ละหมวดแบบกราฟวงกลม พร้อมช่องกรอกตัวเลขที่ปรับผลลัพธ์ได้ทันที</h2>

<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:1.25rem;">
  <div style="background:var(--surface-1); border-radius:var(--radius); padding:1rem;">
    <p style="font-size:13px; color:var(--text-secondary); margin:0 0 6px;">เงินเดือน</p>
    <input type="number" id="salary" value="20000" min="0" step="100" style="font-size:22px; font-weight:500; width:100%; border:none; background:transparent; padding:0;" />
  </div>
  <div style="background:var(--surface-1); border-radius:var(--radius); padding:1rem;">
    <p style="font-size:13px; color:var(--text-secondary); margin:0 0 6px;">รายจ่ายรวม</p>
    <p id="totalSpent" style="font-size:22px; font-weight:500; margin:0;">฿0</p>
  </div>
  <div id="leftoverCard" style="background:var(--bg-success); border-radius:var(--radius); padding:1rem;">
    <p style="font-size:13px; color:var(--text-success); margin:0 0 6px;">เหลือใช้</p>
    <p id="leftover" style="font-size:22px; font-weight:500; margin:0; color:var(--text-success);">฿20,000</p>
  </div>
</div>

<div style="margin-bottom:1.25rem;">
  <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--text-secondary); margin-bottom:6px;">
    <span>สัดส่วนที่ใช้ไปจากเงินเดือน</span>
    <span id="pctUsed">0%</span>
  </div>
  <div style="height:8px; background:var(--surface-1); border-radius:99px; overflow:hidden;">
    <div id="meterBar" style="height:100%; width:0%; background:#1D9E75; border-radius:99px;"></div>
  </div>
</div>

<div style="display:grid; grid-template-columns:220px 1fr; gap:24px; align-items:start;">
  <div>
    <div style="position:relative; width:100%; height:200px;">
      <canvas id="breakdownChart" role="img" aria-label="กราฟวงกลมแสดงสัดส่วนรายจ่ายแต่ละหมวดของเดือนนี้">กราฟสัดส่วนรายจ่ายแต่ละหมวด</canvas>
    </div>
    <div id="legend" style="display:flex; flex-direction:column; gap:6px; margin-top:12px; font-size:12px; color:var(--text-secondary);"></div>
  </div>
  <div id="items" style="display:flex; flex-direction:column; gap:8px;"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
const items = [
  { id: "room", label: "ค่าห้อง", color: "#D85A30" },
  { id: "elec", label: "ค่าไฟ", color: "#BA7517" },
  { id: "water", label: "ค่าน้ำ", color: "#378ADD" },
  { id: "phone", label: "ค่าโทรศัพท์", color: "#7F77DD" },
  { id: "netflix", label: "Netflix", color: "#E24B4A" },
  { id: "youtube", label: "Youtube Premium", color: "#D4537E" },
  { id: "saving", label: "เงินเก็บ", color: "#1D9E75" },
  { id: "fuel", label: "น้ำมัน", color: "#888780" },
  { id: "game", label: "เติมเกม", color: "#639922" }
];

// Inline SVG icon paths (24x24 viewBox) — no external font needed, always renders.
const iconPaths = {
  room: '<path d="M3 11l9-8 9 8"/><path d="M5 10v9a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1v-9"/>',
  elec: '<path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/>',
  water: '<path d="M12 3c3.5 4.5 6 8.2 6 11a6 6 0 0 1-12 0c0-2.8 2.5-6.5 6-11z"/>',
  phone: '<path d="M6 3h3l1 5-2 1.5a11 11 0 0 0 5.5 5.5L15 13l5 1v3a2 2 0 0 1-2 2A16 16 0 0 1 4 5a2 2 0 0 1 2-2z"/>',
  netflix: '<rect x="3" y="5" width="18" height="12" rx="2"/><path d="M9 21h6M12 17v4"/><path d="M10 9l4 2-4 2V9z" fill="currentColor" stroke="none"/>',
  youtube: '<rect x="2" y="6" width="20" height="12" rx="4"/><path d="M10 9.5l5 2.5-5 2.5v-5z" fill="currentColor" stroke="none"/>',
  saving: '<ellipse cx="12" cy="13" rx="7" ry="5"/><path d="M9 8V6l2 1"/><circle cx="16" cy="12" r="0.6" fill="currentColor" stroke="none"/><path d="M7 16v2M17 16v2M4 12H2.5"/>',
  fuel: '<path d="M3 21V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16"/><path d="M3 21h10"/><path d="M15 8h2l3 3v7a1 1 0 0 1-1 1h-1"/><circle cx="17.5" cy="14.5" r="1.2"/><path d="M6 6h4"/>',
  game: '<rect x="3" y="8" width="18" height="9" rx="4"/><path d="M7 11v3M5.5 12.5h3"/><circle cx="16" cy="11" r="0.7" fill="currentColor" stroke="none"/><circle cx="18" cy="13.5" r="0.7" fill="currentColor" stroke="none"/>'
};

function iconSvg(id) {
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconPaths[id]}</svg>`;
}

const defaults = { room: 4000, elec: 800, water: 200, phone: 300, netflix: 349, youtube: 179, saving: 3000, fuel: 1200, game: 500 };

const container = document.getElementById("items");
items.forEach(it => {
  const row = document.createElement("div");
  row.style.cssText = "display:flex; align-items:center; justify-content:space-between; background:var(--surface-2); border:0.5px solid var(--border); border-radius:var(--radius); padding:0.55rem 0.9rem;";
  row.innerHTML = `
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="width:8px; height:8px; border-radius:2px; background:${it.color}; flex-shrink:0;"></span>
      <span style="color:${it.color}; display:inline-flex;" aria-hidden="true">${iconSvg(it.id)}</span>
      <span style="font-size:14px;">${it.label}</span>
    </div>
    <input type="number" id="${it.id}" value="${defaults[it.id]}" min="0" step="10" style="width:100px; text-align:right;" />
  `;
  container.appendChild(row);
});

const legendEl = document.getElementById("legend");
items.forEach(it => {
  const row = document.createElement("span");
  row.style.cssText = "display:flex; align-items:center; gap:6px;";
  row.innerHTML = `<span style="width:8px; height:8px; border-radius:2px; background:${it.color}; flex-shrink:0;"></span><span id="leg-${it.id}">${it.label}</span>`;
  legendEl.appendChild(row);
});

function fmt(n) {
  return "฿" + Math.round(n).toLocaleString("th-TH");
}

if (typeof Chart === "undefined") {
  document.body.innerHTML =
    "<h2 style='font-family:sans-serif;color:red;padding:20px'>ไม่สามารถโหลด Chart.js ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</h2>";
  throw new Error("Chart.js not loaded");
}

const ctx = document.getElementById("breakdownChart").getContext("2d");
const chart = new Chart(ctx, {
  type: "doughnut",
  data: {
    labels: items.map(i => i.label),
    datasets: [{
      data: items.map(i => defaults[i.id]),
      backgroundColor: items.map(i => i.color),
      borderColor: "#ffffff",
      borderWidth: 2
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    cutout: "65%",
    plugins: {
      legend: {
        display: false
      },
      tooltip: {
        callbacks: {
          label(context) {
            return `${context.label}: ${fmt(context.raw)}`;
          }
        }
      }
    }
  }
});

function calc() {
  const salary = parseFloat(document.getElementById("salary").value) || 0;
  let total = 0;
  const values = items.map(it => {
    const v = parseFloat(document.getElementById(it.id).value) || 0;
    total += v;
    return v;
  });
  const remaining = salary - total;
  const pct = salary > 0 ? Math.min(100, Math.max(0, (total / salary) * 100)) : 0;

  document.getElementById("totalSpent").textContent = fmt(total);
  document.getElementById("leftover").textContent = fmt(remaining);
  document.getElementById("pctUsed").textContent = Math.round(pct) + "%";
  document.getElementById("meterBar").style.width = pct + "%";

  const leftoverCard = document.getElementById("leftoverCard");
  const leftoverText = document.getElementById("leftover");
  const meterBar = document.getElementById("meterBar");
  if (remaining < 0) {
    leftoverCard.style.background = "var(--bg-danger)";
    leftoverText.style.color = "var(--text-danger)";
    leftoverCard.querySelector("p:first-child").style.color = "var(--text-danger)";
    meterBar.style.background = "#E24B4A";
  } else {
    leftoverCard.style.background = "var(--bg-success)";
    leftoverText.style.color = "var(--text-success)";
    leftoverCard.querySelector("p:first-child").style.color = "var(--text-success)";
    meterBar.style.background = "#1D9E75";
  }

  items.forEach((it, idx) => {
    const legendSpan = document.getElementById("leg-" + it.id);
    const p = total > 0 ? Math.round((values[idx] / total) * 100) : 0;
    legendSpan.textContent = it.label + " " + fmt(values[idx]) + " (" + p + "%)";
  });

  chart.data.datasets[0].data = values;
  chart.update("none");
}

document.getElementById("salary").addEventListener("input", calc);
items.forEach(it => {
  document.getElementById(it.id).addEventListener("input", calc);
});
calc();
</script>
</body>
</html>
